<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>財報分析合集 · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #F8F7F3;
  --surface: #FFFFFF;
  --border: #E8E6DF;
  --border2: #D4D1C7;
  --text: #1A1916;
  --text2: #6B6860;
  --text3: #A8A59E;
  --accent: #1A1916;
  --purple: #534AB7;
  --teal: #0F6E56;
  --coral: #D85A30;
  --amber: #BA7517;
  --blue: #185FA5;
  --red: #A32D2D;
  --green: #3B6D11;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  padding: 3rem 2.5rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 2rem;
}
.header-left h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--text);
}
.header-left p {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text3);
  margin-top: 0.75rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.stats-row {
  display: flex;
  gap: 2rem;
  align-items: flex-end;
}
.stat-item {
  text-align: right;
}
.stat-item .num {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
  color: var(--text);
}
.stat-item .lbl {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ── Filters ── */
.filter-bar {
  padding: 1rem 2.5rem;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
}
.chip {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  padding: 5px 14px;
  border: 1px solid var(--border2);
  border-radius: 99px;
  cursor: pointer;
  color: var(--text2);
  background: transparent;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--text); color: var(--text); }
.chip.active { background: var(--text); border-color: var(--text); color: #F8F7F3; }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1px;
  background: var(--border);
  padding: 0;
}
.grid-item {
  background: var(--bg);
  padding: 1.5rem;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  overflow: hidden;
}
.grid-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: var(--item-accent, #E8E6DF);
  transition: width 0.2s;
}
.grid-item:hover { background: var(--surface); }
.grid-item:hover::before { width: 5px; }

.item-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.75rem;
}
.item-ticker {
  font-family: 'Syne', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.item-period {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.04em;
  text-align: right;
  margin-top: 4px;
}
.score-dots {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  justify-content: flex-end;
  max-width: 120px;
}
.dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-gap { width: 3px; }

.item-name {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 1rem;
}
.item-metrics {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 1rem;
}
.mrow {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}
.mrow .mlbl { color: var(--text2); }
.mrow .mval { font-weight: 500; }
.mval.up { color: var(--teal); }
.mval.down { color: var(--coral); }
.mval.warn { color: var(--amber); }

.item-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 1rem;
}
.tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 2px;
  font-weight: 500;
}
.tag-sector { background: #EEEDFE; color: #3C3489; }
.tag-signal { background: #EAF3DE; color: #27500A; }
.tag-risk   { background: #FCEBEB; color: #791F1F; }
.tag-watch  { background: #FAEEDA; color: #633806; }

.verdict {
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 4px;
  line-height: 1.4;
  border-left: 2px solid currentColor;
}
.verdict.hold    { background: #FAEEDA; color: var(--amber); }
.verdict.watch   { background: #E6F1FB; color: var(--blue); }
.verdict.caution { background: #FCEBEB; color: var(--red); }
.verdict.quality { background: #EAF3DE; color: var(--green); }

.open-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text3);
  margin-top: 1rem;
  display: flex;
  align-items: center;
  gap: 4px;
  text-transform: uppercase;
}
.open-btn .arrow { transition: transform 0.15s; }
.grid-item:hover .open-btn .arrow { transform: translateX(4px); }

/* ── Detail Panel ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,25,22,0.5);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
  backdrop-filter: blur(4px);
}
.overlay.open { opacity: 1; pointer-events: all; }

.panel {
  position: fixed;
  top: 0; right: 0;
  width: min(740px, 100vw);
  height: 100vh;
  background: var(--surface);
  z-index: 101;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.32,0,0.15,1);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.panel.open { transform: translateX(0); }

.panel-header {
  padding: 2rem 2rem 1.5rem;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 10;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
}
.panel-ticker {
  font-family: 'Syne', sans-serif;
  font-size: 2.5rem;
  font-weight: 800;
  letter-spacing: -0.04em;
}
.panel-period {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.06em;
  margin-top: 4px;
}
.close-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--border2);
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--text2);
  flex-shrink: 0;
  transition: all 0.15s;
}
.close-btn:hover { background: var(--border); color: var(--text); }

.panel-body { padding: 1.5rem 2rem; flex: 1; }

.panel-section { margin-bottom: 2rem; }
.panel-section-title {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 1.5rem;
}
.kpi {
  background: var(--bg);
  border-radius: 6px;
  padding: 0.85rem 1rem;
}
.kpi-lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.kpi-val { font-size: 1.25rem; font-weight: 500; font-family: 'Syne', sans-serif; }
.kpi-sub { font-size: 11px; margin-top: 2px; }

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.detail-row:last-child { border-bottom: none; }
.detail-lbl { color: var(--text2); }
.detail-val { font-weight: 500; }

.score-card {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.score-item {
  background: var(--bg);
  border-radius: 6px;
  padding: 0.85rem 1rem;
}
.score-item .slbl { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.score-item .ssub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.stars-row { display: flex; gap: 3px; margin: 4px 0; }
.star { font-size: 13px; }
.star.on { color: #EF9F27; }
.star.off { color: var(--border2); }

.risk-list { display: flex; flex-direction: column; gap: 10px; }
.risk-item {
  display: flex;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 6px;
  background: var(--bg);
  font-size: 12px;
  color: var(--text2);
  line-height: 1.5;
}
.risk-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 3px;
}

.verdict-box {
  padding: 1rem 1.25rem;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.6;
  border-left: 3px solid currentColor;
}
.verdict-box.hold    { background: #FAEEDA; color: var(--amber); }
.verdict-box.watch   { background: #E6F1FB; color: var(--blue); }
.verdict-box.caution { background: #FCEBEB; color: var(--red); }
.verdict-box.quality { background: #EAF3DE; color: var(--green); }

.chart-wrap { position: relative; height: 200px; width: 100%; }

.narrative-block {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
  padding: 1rem 1.25rem;
  background: var(--bg);
  border-radius: 6px;
  border-left: 2px solid var(--border2);
}
.narrative-block b { color: var(--text); font-weight: 500; }

@media (max-width: 600px) {
  .header { flex-direction: column; align-items: flex-start; padding: 1.5rem; }
  .stats-row { flex-direction: row; gap: 1.5rem; }
  .stat-item { text-align: left; }
  .filter-bar { padding: 0.75rem 1rem; }
  .grid { grid-template-columns: 1fr; }
  .grid-item { padding: 1.25rem; }
  .kpi-grid { grid-template-columns: 1fr; }
  .score-card { grid-template-columns: 1fr; }
  .panel-header { padding: 1.25rem; }
  .panel-body { padding: 1rem 1.25rem; }
  .panel-ticker { font-size: 2rem; }
}
</style>
</head>

        body: '裁員 14%（350人）、退出 22 國、削減 37% 地理足跡、砍掉 3 層管理——這不是普通的成本優化，是一次徹底的組織重置。CEO Bill Staples 在「Act 2 計劃」框架下重塑公司，把資源從分散的全球佈局集中到 AI 驅動的 Duo Agent Platform 和核心 DevSecOps。$35M 重組費用是一次性的，但結構性好處是長期利潤率——這解釋了為什麼 FY2027 EPS 指引遠超共識。風險在於：激進裁員可能傷害執行力和士氣，在競爭最激烈的時刻自我削弱。GitLab 一向以全遠程透明文化著稱，這次重組是對這個文化基因的壓力測試。',
      },
      {
        title: 'Duo Agent Platform——AI 時代的生死賭注',
        body: 'DAP 首季就達到 $20M run rate，且首季淨新增 ARR 超越歷來 Duo Pro 和 Duo Enterprise 任何時期的總和——這是 GitLab AI 貨幣化的最強信號。戰略邏輯：當 AI 讓代碼產量爆炸式增長，安全、合規、治理變成「存在性」需求，而 GitLab 是唯一橫跨完整軟體生命週期、用單一控制平面 + 單一數據模型 + 雲和 AI 模型中立的平台。這個「中立性」是對抗微軟（GitHub Copilot 綁定 Azure/OpenAI）的核心差異化。但威脅同樣真實：Cursor、Claude Code 等 AI 原生工具正在重新定義開發工作流，GitLab 的「全平台」優勢能否抵擋「單點極致」工具的侵蝕，是未來兩年的核心問題。',
      },
      {
        title: 'Forward P/S 3.4× 的估值——便宜的成長股還是價值陷阱？',
        body: 'GTLB 過去一年股價 -31.8%（腰斬），forward P/S 壓縮至 3.4×，遠低於 SaaS 同業（通常 6-10×）。便宜的理由：增速從 30%+ 放緩、AI 編碼工具競爭、FY27 指引低於共識。便宜可能過頭的理由：NRR 117%、$100K+ 大客戶 +18%、DAP 強勁起步、$400M 回購、FY27 EPS 遠超共識、ARR 已破 $10億。分析師目標區間 $24-64.55 的巨大分歧（27 位分析師共識 Hold，目標 $33.52）反映核心爭議：GitLab 是「被 AI 顛覆的舊 DevOps 平台」還是「AI 時代不可或缺的治理層」。內部人 3月以 $51.88 賣出（高於現價），是一個需要留意的信號。',
      },
    ],
    narrative: '',
    chartLabels: ["Q1'26","Q2'26","Q3'26","Q4'26","Q1'27"],
    chartData: [214, 226, 240, 256, 264],
    chartLabel: '季度總收入 ($M)',
    chartColor: '#BA7517',
  },
];

const sectorMap = {
  tech: ['NVDA','SAP','BIDU','CRWD','PANW','CRCL','NOW','AKAM','GTLB'],
  energy: ['FLNC'],
  defense: ['OUST','OPTX','LUNR','GILT'],
  consumer: ['NKE'],
  healthcare: ['MOH','BRKR'],
  crypto: ['CRCL'],
};

function stars(n) {
  return Array.from({length:5}).map((_,i)=>
    `<span class="star ${i<n?'on':'off'}">★</span>`
  ).join('');
}

function dots(scores) {
  const cols = ['#534AB7','#1D9E75','#378ADD','#EF9F27'];
  let h = '';
  scores.forEach((s,ci) => {
    if(ci>0) h += '<div class="dot-gap"></div>';
    for(let j=0;j<5;j++) h += `<div class="dot" style="background:${j<s?cols[ci]:'#D4D1C7'}"></div>`;
  });
  return h;
}

function renderGrid(items) {
  document.getElementById('grid').innerHTML = items.map(d => `
    <div class="grid-item" style="--item-accent:${d.accent}" onclick="openPanel('${d.ticker}')">
      <div class="item-header">
        <div>
          <div class="item-ticker" style="color:${d.accent}">${d.ticker}</div>
        </div>
        <div>
          <div class="score-dots">${dots(d.scores)}</div>
          <div class="item-period" style="margin-top:6px">${d.period}</div>
        </div>
      </div>
      <div class="item-name">${d.name}</div>
      <div class="item-metrics">
        ${d.metrics.map(m=>`<div class="mrow"><span class="mlbl">${m.l}</span><span class="mval ${m.c}">${m.v}</span></div>`).join('')}
      </div>
      <div class="item-tags">
        ${d.tags.map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('')}
      </div>
      <div class="verdict ${d.verdict}">${d.verdictTxt}</div>
      <div class="open-btn">查看詳細分析 <span class="arrow">→</span></div>
    </div>
  `).join('');
  document.getElementById('showing').textContent = items.length;
}

function filter(type, el) {
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  let filtered = DATA;
  if(type==='tech') filtered = DATA.filter(d=>sectorMap.tech.includes(d.ticker));
  else if(type==='energy') filtered = DATA.filter(d=>sectorMap.energy.includes(d.ticker));
  else if(type==='defense') filtered = DATA.filter(d=>sectorMap.defense.includes(d.ticker));
  else if(type==='consumer') filtered = DATA.filter(d=>sectorMap.consumer.includes(d.ticker));
  else if(type==='healthcare') filtered = DATA.filter(d=>sectorMap.healthcare.includes(d.ticker));
  else if(type==='crypto') filtered = DATA.filter(d=>sectorMap.crypto.includes(d.ticker));
  else if(type==='watch') filtered = DATA.filter(d=>['caution','watch'].includes(d.verdict));
  renderGrid(filtered);
}

function openPanel(ticker) {
  const d = DATA.find(x=>x.ticker===ticker);
  if(!d) return;
  document.getElementById('p-ticker').textContent = d.ticker;
  document.getElementById('p-ticker').style.color = d.accent;
  document.getElementById('p-period').textContent = d.name + ' · ' + d.period;

  let chartHtml = '';
  if(d.chartLabels && d.chartData) {
    chartHtml = `
      <div class="panel-section">
        <div class="panel-section-title">收入趨勢</div>
        <div class="chart-wrap"><canvas id="panel-chart"></canvas></div>
      </div>`;
  }

  document.getElementById('p-body').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">核心指標</div>
      <div class="kpi-grid">
        ${d.kpis.map(k=>`
          <div class="kpi">
            <div class="kpi-lbl">${k.l}</div>
            <div class="kpi-val ${k.c}" style="color:${k.c==='up'?'#0F6E56':k.c==='down'?'#D85A30':k.c==='warn'?'#BA7517':'var(--text)'}">${k.v}</div>
            <div class="kpi-sub" style="color:${k.c==='up'?'#0F6E56':k.c==='down'?'#D85A30':'var(--text3)'}">${k.s}</div>
          </div>`).join('')}
      </div>
    </div>

    ${chartHtml}

    <div class="panel-section">
      <div class="panel-section-title">財務明細</div>
      ${d.details.map(r=>`
        <div class="detail-row">
          <span class="detail-lbl">${r.l}</span>
          <span class="detail-val">${r.v}</span>
        </div>`).join('')}
    </div>

    <div class="panel-section">
      <div class="panel-section-title">綜合評分（質量 · 健康 · 增長 · 估值）</div>
      <div class="score-card">
        ${d.scoreLabels.map((lbl,i)=>`
          <div class="score-item">
            <div class="stars-row">${stars(d.scores[i])}</div>
            <div class="slbl">${lbl}</div>
            <div class="ssub">${d.scoreNotes[i]}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">核心風險</div>
      <div class="risk-list">
        ${d.risks.map(r=>`
          <div class="risk-item">
            <div class="risk-dot" style="background:${r.c}"></div>
            <span>${r.t}</span>
          </div>`).join('')}
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">深度解讀</div>
      ${d.narrativeSections && d.narrativeSections.length
        ? d.narrativeSections.map(s => `
            <div style="margin-bottom:1rem">
              <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">${s.title}</div>
              <div class="narrative-block">${s.body}</div>
            </div>`).join('')
        : `<div class="narrative-block">${d.narrative || ''}</div>`
      }
    </div>

    <div class="panel-section">
      <div class="panel-section-title">結論</div>
      <div class="verdict-box ${d.verdict}"><strong>🎯 ${d.verdictTxt}</strong></div>
    </div>
  `;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');

  if(d.chartLabels && d.chartData) {
    setTimeout(() => {
      const ctx = document.getElementById('panel-chart');
      if(!ctx) return;
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: d.chartLabels,
          datasets: [{
            label: d.chartLabel,
            data: d.chartData,
            backgroundColor: d.chartData.map((_,i)=>
              i===d.chartData.length-1 ? d.accent : d.accent+'66'
            ),
            borderRadius: 4,
            barPercentage: 0.6,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => d.chartLabel + ': ' + c.raw } } },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#A8A59E' } },
            y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 }, color: '#A8A59E' } }
          }
        }
      });
    }, 50);
  }
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });

renderGrid(DATA);

</script>
</body>
</html>
